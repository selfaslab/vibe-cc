<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { width: 320px; font-family: "Malgun Gothic", sans-serif; }
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div>
    <h1 class="text-base font-bold text-gray-800 mb-1">클로드 추출기</h1>
    <p class="text-xs text-gray-500 mb-3">저장 형식을 선택하세요</p>

    <div class="space-y-2">
      <button id="download-md" type="button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition">
        Markdown (.md)
      </button>
      <button id="download-txt" type="button" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition">
        텍스트 (.txt)
      </button>
      <button id="download-pdf" type="button" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition">
        PDF (.pdf)
      </button>
    </div>

    <p id="status-msg" class="mt-3 text-xs text-gray-400 min-h-[1rem]"></p>
    <p class="mt-2 text-[10px] text-gray-400 leading-tight">PDF: 인쇄 창에서 「PDF로 저장」 선택</p>
  </div>
  <script src="export-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
