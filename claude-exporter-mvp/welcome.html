<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>클로드 추출기 — 시작하기</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-lg mx-auto p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">클로드 추출기 설치 완료</h1>
    <p class="text-sm text-gray-500 mb-8">3단계만 따라하면 바로 사용할 수 있습니다.</p>

    <ol class="space-y-6">
      <li class="bg-white rounded-lg shadow p-5">
        <div class="flex items-start gap-3">
          <span class="flex-shrink-0 w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm">1</span>
          <div>
            <h2 class="font-semibold text-gray-800 mb-1">툴바에 고정</h2>
            <p class="text-sm text-gray-600">퍼즐 아이콘 → 클로드 추출기 → <strong>핀</strong></p>
          </div>
        </div>
      </li>
      <li class="bg-white rounded-lg shadow p-5">
        <div class="flex items-start gap-3">
          <span class="flex-shrink-0 w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm">2</span>
          <div>
            <h2 class="font-semibold text-gray-800 mb-1">Claude 대화 열기</h2>
            <p class="text-sm text-gray-600"><a href="https://claude.ai" class="text-indigo-600 hover:underline" target="_blank" rel="noopener noreferrer">claude.ai</a>에서 저장할 대화를 엽니다.</p>
          </div>
        </div>
      </li>
      <li class="bg-white rounded-lg shadow p-5">
        <div class="flex items-start gap-3">
          <span class="flex-shrink-0 w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm">3</span>
          <div>
            <h2 class="font-semibold text-gray-800 mb-1">아이콘 클릭 → 형식 선택</h2>
            <p class="text-sm text-gray-600">작은 창에서 <strong>Markdown / TXT / PDF</strong> 중 선택해 저장합니다.</p>
          </div>
        </div>
      </li>
    </ol>

    <div class="mt-8 p-4 bg-amber-50 border border-amber-200 rounded-lg">
      <p class="text-sm text-amber-800"><strong>추출 실패 시:</strong> 대화 페이지에서 F5 새로고침 후 다시 시도하세요.</p>
    </div>
  </div>
</body>
</html>
